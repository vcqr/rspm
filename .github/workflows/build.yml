name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build on ${{ matrix.os }} (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 glibc
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            os: linux
            arch: x86_64
          # Linux ARM64 glibc
          - runner: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            os: linux
            arch: aarch64
          # Linux x86_64 musl
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            os: linux
            arch: x86_64
            is_musl: true
          # Linux ARM64 musl
          - runner: ubuntu-24.04
            target: aarch64-unknown-linux-musl
            os: linux
            arch: aarch64
            is_musl: true
          # macOS ARM64
          - runner: macos-15
            target: aarch64-apple-darwin
            os: macos
            arch: aarch64
          # macOS x86_64
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            os: macos
            arch: x86_64
          # Windows x86_64
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            os: windows
            arch: x86_64
          # Windows ARM64
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            os: windows
            arch: aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # 安装 Zig 编译器（musl 交叉编译必需）
      - name: Setup Zig (for musl cross-compilation)
        if: matrix.is_musl
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      # 安装 cargo-zigbuild 插件（依赖 zig 已安装）
      - name: Install cargo-zigbuild
        if: matrix.is_musl
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Install protobuf compiler
        run: |
          if [ "${{ matrix.os }}" = "linux" ]; then
            sudo apt-get update && sudo apt-get install -y protobuf-compiler
          elif [ "${{ matrix.os }}" = "macos" ]; then
            brew install protobuf
          fi
        shell: bash

      - name: Install protobuf compiler (Windows)
        if: matrix.os == 'windows'
        run: |
          choco install protoc --version=25.1 -y
        shell: pwsh

      - name: Install cross-compilation tools (Linux ARM64 glibc)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF
        shell: bash

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-
            ${{ runner.os }}-cargo-

      # 根据是否为 musl 自动切换构建工具
      - name: Build rspm-cli
        run: ${{ matrix.is_musl && 'cargo-zigbuild' || 'cargo' }} build --release --target ${{ matrix.target }} -p rspm-cli

      - name: Build rspm-daemon
        run: ${{ matrix.is_musl && 'cargo-zigbuild' || 'cargo' }} build --release --target ${{ matrix.target }} -p rspm-daemon --features embed-static

      - name: Prepare artifacts (Unix)
        if: matrix.os != 'windows'
        run: |
          mkdir -p release-artifacts
          TARGET_DIR="target/${{ matrix.target }}/release"
          cp "$TARGET_DIR/rspm" "release-artifacts/rspm"
          cp "$TARGET_DIR/rspmd" "release-artifacts/rspmd"

          VERSION=${{ github.ref_name }}
          if [ -z "$VERSION" ]; then
            VERSION="latest"
          fi
          # 自动追加 -musl 后缀
          ARCHIVE_NAME="rspm-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.is_musl && '-musl' || '' }}"
          cd release-artifacts
          tar -czf "../${ARCHIVE_NAME}.tar.gz" rspm rspmd
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> $GITHUB_ENV

      - name: Prepare artifacts (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-artifacts
          $TARGET_DIR = "target\${{ matrix.target }}\release"
          Copy-Item "$TARGET_DIR\rspm.exe" "release-artifacts\rspm.exe"
          Copy-Item "$TARGET_DIR\rspmd.exe" "release-artifacts\rspmd.exe"

          $VERSION = if ("${{ github.ref_name }}") { "${{ github.ref_name }}" } else { "latest" }
          $ARCHIVE_NAME = "rspm-$VERSION-${{ matrix.os }}-${{ matrix.arch }}"
          Set-Location release-artifacts
          Compress-Archive -Path rspm.exe,rspmd.exe -DestinationPath "..\$ARCHIVE_NAME.zip"
          "ARCHIVE_NAME=$ARCHIVE_NAME" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rspm-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.is_musl && '-musl' || '' }}
          path: |
            *.tar.gz
            *.zip
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: false
          generate_release_notes: true
          body: |
            ## RSPM ${{ github.ref_name }}

            ### 下载说明
            - **Linux x86_64 (glibc)**: `rspm-${{ github.ref_name }}-linux-x86_64.tar.gz`
            - **Linux ARM64 (glibc)**: `rspm-${{ github.ref_name }}-linux-aarch64.tar.gz`
            - **Linux x86_64 (musl)**: `rspm-${{ github.ref_name }}-linux-x86_64-musl.tar.gz`
            - **Linux ARM64 (musl)**: `rspm-${{ github.ref_name }}-linux-aarch64-musl.tar.gz`
            - **macOS ARM64 (Apple Silicon)**: `rspm-${{ github.ref_name }}-macos-aarch64.tar.gz`
            - **macOS x86_64 (Intel)**: `rspm-${{ github.ref_name }}-macos-x86_64.tar.gz`
            - **Windows x86_64**: `rspm-${{ github.ref_name }}-windows-x86_64.zip`
            - **Windows ARM64**: `rspm-${{ github.ref_name }}-windows-aarch64.zip`

            ### 选型建议
            - 选择 `glibc` 版本：适用于 Ubuntu/Debian/CentOS/Fedora 等主流发行版
            - 选择 `musl` 版本：适用于 Alpine Linux、Distroless 镜像、容器化部署或需极致轻量的场景
            - macOS/Windows 按系统架构直接下载即可

            ### 安装步骤
            1. 下载对应平台的压缩包
            2. 解压到目标目录
            3. 添加可执行文件到 PATH

            #### Linux/macOS
            ```bash
            tar -xzf rspm-*.tar.gz
            chmod +x rspm rspmd
            sudo mv rspm rspmd /usr/local/bin/
            ```

            #### Windows
            ```powershell
            Expand-Archive -Path rspm-*.zip -DestinationPath rspm
            # 将 rspm 目录添加到 PATH
            ```

            ### 快速开始
            ```bash
            # 启动守护进程
            rspmd &

            # 使用 CLI
            rspm start --name myapp -- /bin/sleep 100
            rspm list
            rspm logs myapp
            ```
