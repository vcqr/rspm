name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build on ${{ matrix.os }} (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            os: linux
            arch: x86_64
          # Linux ARM64
          - runner: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            os: linux
            arch: aarch64
          # macOS x86_64 (Intel)
          - runner: macos-15-xlarge
            target: x86_64-apple-darwin
            os: macos
            arch: x86_64
          # macOS ARM64 (Apple Silicon)
          - runner: macos-15
            target: aarch64-apple-darwin
            os: macos
            arch: aarch64
          # Windows x86_64
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            os: windows
            arch: x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protobuf compiler
        run: |
          if [ "${{ matrix.os }}" = "linux" ]; then
            sudo apt-get update && sudo apt-get install -y protobuf-compiler
          elif [ "${{ matrix.os }}" = "macos" ]; then
            brew install protobuf
          fi
        shell: bash

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          
          # Configure cargo linker for cross-compilation
          mkdir -p .cargo
          cat >> .cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF
        shell: bash

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-
            ${{ runner.os }}-cargo-

      - name: Build rspm-cli
        run: cargo build --release --target ${{ matrix.target }} -p rspm-cli

      - name: Build rspm-daemon
        run: cargo build --release --target ${{ matrix.target }} -p rspm-daemon --features embed-static

      - name: Prepare artifacts (Unix)
        if: matrix.os != 'windows'
        run: |
          mkdir -p release-artifacts
          TARGET_DIR="target/${{ matrix.target }}/release"
          cp "$TARGET_DIR/rspm" "release-artifacts/rspm"
          cp "$TARGET_DIR/rspmd" "release-artifacts/rspmd"
          
          # Create archive
          VERSION=${{ github.ref_name }}
          if [ -z "$VERSION" ]; then
            VERSION="latest"
          fi
          ARCHIVE_NAME="rspm-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}"
          cd release-artifacts
          tar -czf "../${ARCHIVE_NAME}.tar.gz" rspm rspmd
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> $GITHUB_ENV

      - name: Prepare artifacts (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-artifacts
          $TARGET_DIR = "target\${{ matrix.target }}\release"
          Copy-Item "$TARGET_DIR\rspm.exe" "release-artifacts\rspm.exe"
          Copy-Item "$TARGET_DIR\rspmd.exe" "release-artifacts\rspmd.exe"
          
          # Create archive
          $VERSION = if ("${{ github.ref_name }}") { "${{ github.ref_name }}" } else { "latest" }
          $ARCHIVE_NAME = "rspm-$VERSION-${{ matrix.os }}-${{ matrix.arch }}"
          Set-Location release-artifacts
          Compress-Archive -Path rspm.exe,rspmd.exe -DestinationPath "..\$ARCHIVE_NAME.zip"
          "ARCHIVE_NAME=$ARCHIVE_NAME" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rspm-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            *.tar.gz
            *.zip
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: false
          generate_release_notes: true
          body: |
            ## RSPM ${{ github.ref_name }}
            
            ### 下载说明
            - **Linux x86_64**: `rspm-${{ github.ref_name }}-linux-x86_64.tar.gz`
            - **Linux ARM64**: `rspm-${{ github.ref_name }}-linux-aarch64.tar.gz`
            - **macOS x86_64**: `rspm-${{ github.ref_name }}-macos-x86_64.tar.gz`
            - **macOS ARM64 (Apple Silicon)**: `rspm-${{ github.ref_name }}-macos-aarch64.tar.gz`
            - **Windows x86_64**: `rspm-${{ github.ref_name }}-windows-x86_64.zip`
            
            ### 安装步骤
            1. 下载对应平台的压缩包
            2. 解压到目标目录
            3. 添加可执行文件到 PATH
            
            #### Linux/macOS
            ```bash
            tar -xzf rspm-*.tar.gz
            chmod +x rspm rspmd
            sudo mv rspm rspmd /usr/local/bin/
            ```
            
            #### Windows
            ```powershell
            Expand-Archive -Path rspm-*.zip -DestinationPath rspm
            # 将 rspm 目录添加到 PATH
            ```
            
            ### 快速开始
            ```bash
            # 启动守护进程
            rspmd &
            
            # 使用 CLI
            rspm start --name myapp -- /bin/sleep 100
            rspm list
            rspm logs myapp
            ```
